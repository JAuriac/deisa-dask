name: Python unit tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
        dask-version: [ "2025.5.0", "2025.7.0", "2025.11.0" ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install dask==${{ matrix.dask-version }} distributed==${{ matrix.dask-version }}
          python -m pip install .
          python -m pip install .[test]
      - name: Test with pytest
        run: |
          pytest test/ -n auto --dist loadgroup

  mpi-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
        dask-version: [ "2025.5.0", "2025.7.0", "2025.11.0" ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install MPI
        run: sudo apt-get update && sudo apt-get install -y openmpi-bin openmpi-common libopenmpi-dev
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install dask==${{ matrix.dask-version }} distributed==${{ matrix.dask-version }}
          python -m pip install .
          python -m pip install .[test,mpi]
      - name: Verify mpirun is available
        run: which mpirun && mpirun --version
      - name: Debug MPI environment
        run: |
          which mpirun || echo "mpirun NOT in PATH"
          mpirun --version
          python -c "import shutil; print('has mpirun:', bool(shutil.which('mpirun')))"
      - name: MPI test with pytest
        run: |
          pytest test/test_comm.py
